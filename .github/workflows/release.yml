name: release

# One workflow, the whole release pipeline:
#
#   push to main  ──►  release-please job  ──►  opens / updates a
#                                              "chore(main): release vX.Y.Z" PR
#                                              with the changelog
#
#   merge that PR ──►  release-please job  ──►  creates the GitHub Release
#                                              + tag, sets release_created=true
#                                                       │
#                                                       ▼
#                      goreleaser job      ──►  builds 5 platform binaries
#                                              uploads them to the release
#                                              auto-pushes the formula to
#                                              target-ops/homebrew-tap
#
#   workflow_dispatch ──►  goreleaser job  ──►  manual recovery for an
#   (with tag input)                            existing tag — release-please
#                                              is skipped
#
# Why two jobs in one file (instead of two workflows): the brew formula
# update is part of "release", not a separate concern. Splitting the
# pipeline into release-please.yml + release.yml previously bit us
# because tags created by release-please via the default GITHUB_TOKEN
# don't fire `push: tags` (anti-loop safeguard) — we needed an
# inter-workflow `release: published` bridge to glue them. Folding
# both jobs into one file deletes the bridge and the gotcha.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build, e.g. v1.0.1. Leave empty for the normal release-please flow.'
        required: false

permissions:
  # release-please needs to open/update PRs and create releases.
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Skip on manual recovery — the maintainer is targeting a specific
    # tag, not driving the version-bump flow.
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file:   .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  goreleaser:
    needs: [release-please]
    # Run when EITHER:
    #   - release-please just cut a release on the merge of a release PR
    #   - someone manually dispatched with a tag for recovery
    # `always()` is required so this job isn't skipped just because
    # release-please was skipped (workflow_dispatch path).
    if: |
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On manual dispatch: check out the supplied tag.
          # On the release-please path: check out the tag release-please created.
          ref: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
          # GoReleaser needs full history to compute the changelog
          # since the previous tag.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo PAT used by the `brews:` block in .goreleaser.yml
          # to push the updated formula to target-ops/homebrew-tap on
          # every release. Set on the gitswitch repo's secrets.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
