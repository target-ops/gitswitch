name: release-please

# Read every push to main, look at Conventional Commits since the last
# release, and either open a "release vX.Y.Z" PR with the computed
# version + changelog, or update the existing one. Merging that PR is
# what tags the release — which fires release.yml below to build the
# binaries and publish the brew formula.
#
# Fully hands-off otherwise: nothing here force-publishes, the PR
# is the human gate.
on:
  push:
    branches: [main]

permissions:
  # Open/update the release PR + push the tag on merge.
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
