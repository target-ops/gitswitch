# Cross-compile + release config for gitswitch.
#
# Local sanity check:
#   goreleaser release --snapshot --clean --skip=publish
# Tag-driven publish (run by GitHub Actions on tag push):
#   goreleaser release --clean
version: 2
project_name: gitswitch

before:
  hooks:
    - go mod tidy

builds:
  - id: gitswitch
    main: ./cmd/gitswitch
    binary: gitswitch
    env:
      # Static binary so the formula stays "drop one file into bin/".
      # CGO_ENABLED=0 means no libc linkage, no "wrong glibc" surprises
      # on Linux, and no Cellar/Frameworks fallout on macOS.
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Apple shipped Windows-on-ARM laptops exist but the audience for
      # gitswitch on them is microscopic. Drop in to keep CI fast; can
      # be re-enabled later if anyone asks.
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}

archives:
  - id: gitswitch
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: target-ops
    name: gitswitch
  draft: false
  prerelease: auto
  header: |
    Install via brew:

    ```
    brew update
    brew install target-ops/tap/gitswitch   # or: brew upgrade gitswitch
    ```

    Or grab a binary from the assets below.

# Auto-publish the homebrew formula to target-ops/homebrew-tap on
# every release. GoReleaser computes the per-platform sha256s,
# generates the Formula/gitswitch.rb with on_macos/on_linux blocks,
# and pushes a commit to the tap repo. Requires HOMEBREW_TAP_TOKEN
# in the gitswitch repo's secrets — a PAT with write access to the
# homebrew-tap repo's contents (the default GITHUB_TOKEN can't reach
# across repositories).
brews:
  - repository:
      owner: target-ops
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/target-ops/gitswitch"
    description: "Stop committing as the wrong person — directory-bound git identities"
    license: "MIT"
    # Skip publishing to the tap on prereleases (release candidates,
    # beta tags, etc.). Stable users on `brew install` should never
    # accidentally pick up a -rc build.
    skip_upload: auto
    install: |
      bin.install "gitswitch"
    test: |
      assert_match version.to_s, shell_output("#{bin}/gitswitch --version")
      help = shell_output("#{bin}/gitswitch --help")
      %w[init use guard doctor why].each do |cmd|
        assert_match cmd, help
      end
    commit_author:
      name: gitswitch-release-bot
      email: noreply@github.com
    commit_msg_template: "gitswitch: bump to {{ .Tag }}"
